<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cache Inspector</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <script>
        // Apply saved theme before paint to avoid flash
        (function() {
            const t = localStorage.getItem('theme');
            if (t === 'light') document.documentElement.dataset.theme = 'light';
        })();
    </script>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚡ Cache Inspector</h1>
            <p class="subtitle">Visual diagnostics for your cache performance</p>
            <button class="theme-btn" id="theme-btn" onclick="toggleTheme()"></button>
        </header>

        <div class="input-section">
            <label class="input-label" for="url-input">
                🔗 Enter URL to Inspect
            </label>
            <div class="url-input-group">
                <select id="protocol-select">
                    <option value="https://" selected>https://</option>
                    <option value="http://">http://</option>
                </select>
                <input
                    type="text"
                    id="url-input"
                    placeholder="example.com/path"
                    autocomplete="off"
                    spellcheck="false"
                />
            </div>
            <div class="button-group">
                <button class="btn-primary" id="inspect-btn" onclick="analyzeHeaders()">🔍 Inspect Cache</button>
                <button class="btn-secondary" onclick="clearAll()">Clear</button>
            </div>
        </div>

        <div class="results" id="results">
            <!-- Results will be dynamically inserted here -->
        </div>
    </div>

    <script>
        // ── Theme toggle ────────────────────────────────────────────────────
        function isLight() {
            return document.documentElement.dataset.theme === 'light';
        }

        function updateThemeBtn() {
            document.getElementById('theme-btn').textContent =
                isLight() ? '🌙 Switch to dark theme' : '☀️ Switch to light theme';
        }

        function toggleTheme() {
            if (isLight()) {
                delete document.documentElement.dataset.theme;
                localStorage.removeItem('theme');
            } else {
                document.documentElement.dataset.theme = 'light';
                localStorage.setItem('theme', 'light');
            }
            updateThemeBtn();
        }

        updateThemeBtn();

        // ── Fastly helpers ──────────────────────────────────────────────────
        function parseFastlyDebugPath(pathHeader) {
            if (!pathHeader) return [];
            const regex = /\(([A-Z])\s+([^\s]+)\s+([\d.]+)\)/g;
            const paths = [];
            let match;
            while ((match = regex.exec(pathHeader)) !== null) {
                paths.push({ type: match[1], location: match[2], timestamp: match[3] });
            }
            return paths;
        }

        function parseXTimer(timerHeader) {
            if (!timerHeader) return null;
            const parts = timerHeader.split(',');
            const result = {};
            parts.forEach(part => {
                if (part.startsWith('VE'))      result.vclEnd   = parseInt(part.substring(2));
                else if (part.startsWith('VS')) result.vclStart = parseInt(part.substring(2));
                else if (part.startsWith('S'))  result.startTime = parseFloat(part.substring(1));
            });
            return result;
        }

        // ── Status helpers ──────────────────────────────────────────────────
        function getStatusType(cacheStatus) {
            if (!cacheStatus) return 'pass';
            const statuses = cacheStatus.split(',').map(s => s.trim().toLowerCase());
            if (statuses.some(s => s === 'hit'))  return 'hit';
            if (statuses.some(s => s === 'miss')) return 'miss';
            return 'pass';
        }

        function getNodeClass(status) {
            switch (status.toUpperCase()) {
                case 'HIT':  return 'node-hit';
                case 'MISS': return 'node-miss';
                case 'PASS': return 'node-pass';
                default:     return 'node-default';
            }
        }

        // ── Fetch ───────────────────────────────────────────────────────────
        async function analyzeHeaders() {
            const host = document.getElementById('url-input').value.trim();
            if (!host) { alert('Please enter a URL first!'); return; }

            const protocol = document.getElementById('protocol-select').value;
            const url = /^https?:\/\//i.test(host) ? host : protocol + host;

            try { new URL(url); } catch {
                alert('Please enter a valid URL (e.g. example.com/path)');
                return;
            }

            const btn = document.getElementById('inspect-btn');
            btn.disabled = true;
            btn.textContent = '⏳ Fetching…';

            try {
                const res = await fetch(`/fetch-headers?url=${encodeURIComponent(url)}`);
                const data = await res.json();
                if (!res.ok) { alert(`Error: ${data.error || 'Failed to fetch headers'}`); return; }
                renderResults(data.headers, data.cdn, data.cacheStatus, data.cacheHits);
            } catch (err) {
                alert(`Failed to fetch headers: ${err.message}`);
            } finally {
                btn.disabled = false;
                btn.textContent = '🔍 Inspect Cache';
            }
        }

        // ── Render ──────────────────────────────────────────────────────────
        function renderResults(headers, cdn = { name: 'Unknown', cssClass: 'cdn-unknown' }, cacheStatus = null, cacheHits = null) {
            const debugPath = parseFastlyDebugPath(headers['fastly-debug-path']);
            const timer     = parseXTimer(headers['x-timer']);
            const servedBy  = headers['x-served-by'];
            const digest    = headers['fastly-debug-digest'];

            let html = '';

            const statusType = getStatusType(cacheStatus);
            let statusText = 'UNKNOWN';
            if (cacheStatus) {
                const statuses = cacheStatus.split(',').map(s => s.trim().toLowerCase());
                statusText = statuses.some(s => s === 'hit') ? 'HIT' : cacheStatus.split(',')[0].trim();
            }

            html += `
                <div class="status-hero">
                    <div class="status-circle ${cdn.cssClass}">
                        <div>${cdn.name}</div>
                        <div class="status-label">CDN</div>
                    </div>
                    <div class="status-circle ${statusType}">
                        <div>${statusText}</div>
                        <div class="status-label">Cache Status</div>
                    </div>
            `;

            if (timer && timer.vclStart !== undefined && timer.vclEnd !== undefined) {
                const vclTime = timer.vclEnd - timer.vclStart;
                html += `
                    <div class="status-circle circle-vcl">
                        <div>${vclTime}ms</div>
                        <div class="status-label">VCL Time</div>
                    </div>
                `;
            }

            if (cacheHits) {
                const totalHits = cacheHits.split(',').reduce((sum, h) => sum + parseInt(h.trim() || 0), 0);
                html += `
                    <div class="status-circle circle-hits">
                        <div>${totalHits}</div>
                        <div class="status-label">Total Hits</div>
                    </div>
                `;
            }

            html += `</div>`;

            // Flow diagram (Fastly-specific, requires x-served-by)
            if (debugPath.length > 0 || servedBy) {
                const pops     = servedBy ? servedBy.split(',').map(s => s.trim()) : [];
                const statuses = cacheStatus ? cacheStatus.split(',').map(s => s.trim()) : [];

                let requestTimeHtml = '';
                if (debugPath.length > 0 || (timer && timer.startTime)) {
                    let startTime, endTime;
                    if (debugPath.length > 0)
                        startTime = new Date(parseFloat(debugPath[0].timestamp) * 1000);
                    else if (timer && timer.startTime)
                        startTime = new Date(timer.startTime * 1000);

                    if (timer && timer.startTime && timer.vclEnd)
                        endTime = new Date((timer.startTime * 1000) + timer.vclEnd);
                    else if (debugPath.length > 0 && timer && timer.vclEnd)
                        endTime = new Date((parseFloat(debugPath[0].timestamp) * 1000) + timer.vclEnd);

                    const fmt = { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit', fractionalSecondDigits:3, hour12:false };
                    let diffHtml = '';
                    if (startTime && endTime) {
                        const ms = endTime - startTime;
                        diffHtml = `<div style="margin-top:0.5rem;"><span style="background:var(--c-vcl-bg);color:var(--c-vcl-color);border:1px solid var(--c-vcl-border);padding:0.3rem 0.9rem;border-radius:8px;font-weight:700;font-size:0.9rem;">⏱ Total: ${ms.toFixed(1)}ms</span></div>`;
                    }
                    requestTimeHtml = `
                        <div style="text-align:center;color:var(--subtitle-color);font-size:0.85rem;margin-bottom:1rem;">
                            <div style="display:flex;justify-content:center;gap:2rem;flex-wrap:wrap;">
                                ${startTime ? `<div>🕐 <strong style="color:#3b82f6;">Start:</strong> ${startTime.toLocaleString('en-US', fmt)}</div>` : ''}
                                ${endTime   ? `<div>🕐 <strong style="color:#06b6d4;">End:</strong>   ${endTime.toLocaleString('en-US', fmt)}</div>` : ''}
                            </div>
                            ${diffHtml}
                        </div>`;
                }

                let cacheKeyHtml = '';
                if (digest) {
                    cacheKeyHtml = `
                        <div style="text-align:center;margin-bottom:1.5rem;">
                            <div class="cache-key-visual" style="display:inline-flex;max-width:600px;">
                                <span class="fingerprint">🔐</span>
                                <span style="flex:1;word-break:break-all;">${digest}</span>
                            </div>
                        </div>`;
                }

                let segmentTime = null;
                if (timer && timer.vclEnd)
                    segmentTime = Math.round(timer.vclEnd / Math.max(pops.length + 1, 1));

                function arrowHtml(label) {
                    return `
                        <div class="flow-arrow">
                            <div class="arrow-line">
                                <div class="arrow-shaft"></div>
                                <div class="arrow-head"></div>
                            </div>
                            ${label ? `<div class="arrow-timing">${label}</div>` : ''}
                        </div>`;
                }

                html += `
                    <div class="flow-container">
                        <h2 class="flow-title">🌍 Request Journey</h2>
                        ${requestTimeHtml}
                        ${cacheKeyHtml}
                        <div class="flow-diagram">
                            <div class="flow-node">
                                <div class="node node-default">
                                    <div class="node-icon">👤</div>
                                    <div class="node-label">Client</div>
                                </div>
                            </div>
                `;

                let sentToOrigin = false;
                pops.forEach((pop, index) => {
                    const status  = statuses[index] || 'UNKNOWN';
                    const hitsArr = cacheHits ? cacheHits.split(',') : [];
                    const hits    = hitsArr[index] !== undefined ? hitsArr[index].trim() : '0';
                    if (status.toUpperCase() === 'MISS') sentToOrigin = true;

                    html += arrowHtml(segmentTime ? `${segmentTime}ms` : '');
                    html += `
                        <div class="flow-node">
                            <div class="node ${getNodeClass(status)}">
                                <div class="node-icon">🌐</div>
                                <div class="node-label">${pop}</div>
                                <div class="node-detail">${status} | ${hits} hits</div>
                            </div>
                        </div>`;
                });

                if (sentToOrigin) {
                    html += arrowHtml('');
                    html += `
                        <div class="flow-node">
                            <div class="node node-origin">
                                <div class="node-icon">🏢</div>
                                <div class="node-label">Origin</div>
                            </div>
                        </div>`;
                }

                html += `</div></div>`;
            }

            const headerRows = Object.entries(headers)
                .sort(([a], [b]) => a.localeCompare(b))
                .map(([k, v]) => `<tr><td>${k}</td><td>${v}</td></tr>`)
                .join('');
            html += `<div class="headers-dump">
                <div class="flow-title">Raw Headers</div>
                <table>${headerRows}</table>
            </div>`;

            const results = document.getElementById('results');
            results.innerHTML = html;
            results.classList.add('active');
            results.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function clearAll() {
            document.getElementById('protocol-select').value = 'https://';
            document.getElementById('url-input').value = '';
            const results = document.getElementById('results');
            results.classList.remove('active');
            results.innerHTML = '';
        }

        document.getElementById('url-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') analyzeHeaders();
        });
    </script>
</body>
</html>
